# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Configuração de PRODUÇÃO (usado pelo Dokploy)
#
# O código é compilado DENTRO das imagens Docker — sem bind mounts de código.
# Cada redeploy reconstrói as imagens com o código mais recente do git.
#
# Para desenvolvimento local use:
#   docker compose -f docker-compose.dev.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Banco de dados ──────────────────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: financedash_db
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-financedash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financedash_dev}
      POSTGRES_DB:       ${POSTGRES_DB:-financedash}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financedash}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: financedash_redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── API FastAPI ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      pull: true   # sempre baixa imagem base atualizada → garante rebuild no Dokploy
    image: financedash-api:latest
    container_name: financedash_api
    restart: always
    entrypoint: ["/docker-entrypoint.sh"]   # roda alembic + uvicorn com workers
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-financedash}:${POSTGRES_PASSWORD:-financedash_dev}@db:5432/${POSTGRES_DB:-financedash}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
      - plan_configs_data:/app/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    image: financedash-api:latest   # reutiliza a imagem da API
    container_name: financedash_worker
    restart: always
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-financedash}:${POSTGRES_PASSWORD:-financedash_dev}@db:5432/${POSTGRES_DB:-financedash}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --concurrency=2
        --without-gossip
        --without-mingle

  # ── Celery Beat (agendador — NUNCA escalar acima de 1 réplica) ──────────────
  beat:
    image: financedash-api:latest
    container_name: financedash_beat
    restart: always
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-financedash}:${POSTGRES_PASSWORD:-financedash_dev}@db:5432/${POSTGRES_DB:-financedash}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app beat
        --loglevel=info
        --schedule /tmp/celerybeat-schedule

  # ── Frontend Next.js ────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      pull: true   # sempre baixa imagem base atualizada → garante rebuild no Dokploy
      args:
        NEXT_PUBLIC_API_URL: ""          # browser usa /api/* na mesma origem
        INTERNAL_API_URL: http://api:8000
    image: financedash-web:latest
    container_name: financedash_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  plan_configs_data:
