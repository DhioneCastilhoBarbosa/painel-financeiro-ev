# FinanceDash — Docker Compose de Produção
# Executar a partir desta pasta:  cd prod && docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Banco de dados ───────────────────────────────────────────────────────────
  # Para migrar para AWS RDS: comente todo este bloco e atualize DATABASE_URL no .env
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: fd_db
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  # Para migrar para AWS ElastiCache: comente este bloco e atualize REDIS_URL no .env
  redis:
    image: redis:7-alpine
    container_name: fd_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── API FastAPI ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    image: financedash-api          # imagem reutilizada por worker e beat
    container_name: fd_api
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --proxy-headers
      --forwarded-allow-ips "*"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  worker:
    image: financedash-api          # mesma imagem da API — sem build separado
    container_name: fd_worker
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=2
      --without-gossip
      --without-mingle

  # ── Celery Beat (agendador de tarefas) ────────────────────────────────────────
  # CRÍTICO: NUNCA escalar acima de 1 réplica — múltiplas instâncias causam tarefas duplicadas
  beat:
    image: financedash-api
    container_name: fd_beat
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=info
      --schedule /tmp/celerybeat-schedule

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""     # vazio = browser usa /api/* → nginx roteia para API
    image: financedash-web
    container_name: fd_web
    restart: always
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://api:8000   # servidor Next.js → API via rede interna Docker
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Nginx (reverse proxy + SSL) ───────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: fd_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro    # certs gerados pelo certbot no host
      - certbot_www:/var/www/certbot:ro         # webroot para renovação automática
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  redis_data:
  certbot_www:
