# FinanceDash — GitHub Actions CI/CD
#
# Para ativar: copie este arquivo para .github/workflows/deploy.yml na raiz do repositório
#
# Secrets necessários no GitHub (Settings → Secrets and variables → Actions):
#   EC2_HOST      — IP público ou DNS da instância EC2 (ex: 54.123.45.67)
#   EC2_USER      — Usuário SSH (padrão: ubuntu)
#   EC2_SSH_KEY   — Chave SSH privada (.pem) — cole o conteúdo completo incluindo cabeçalho
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy para AWS

on:
  push:
    branches: [main]
  workflow_dispatch:      # permite disparo manual pelo GitHub UI

jobs:
  deploy:
    name: Deploy EC2
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout do código ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Verificação de lint/tipos (opcional — remova se demorar demais) ──
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Instalar dependências frontend
        working-directory: apps/web
        run: npm ci --prefer-offline

      - name: TypeScript check
        working-directory: apps/web
        run: npx tsc --noEmit
        continue-on-error: true    # não bloqueia deploy por erros TS pré-existentes

      # ── 3. Deploy via SSH ────────────────────────────────────────────────────
      - name: Deploy no EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          timeout:     15m
          script: |
            set -euo pipefail
            echo "=== Deploy iniciado: $(date) ==="

            cd /home/${{ secrets.EC2_USER }}/financedash-saas/prod
            chmod +x scripts/deploy.sh scripts/backup.sh scripts/setup.sh
            bash scripts/deploy.sh

            echo "=== Deploy finalizado: $(date) ==="

      # ── 4. Notificação de falha (opcional) ───────────────────────────────────
      - name: Notificar falha
        if: failure()
        run: |
          echo "::error::Deploy falhou. Verifique os logs acima."
          # Para integrar com Slack/Discord, adicione um step de webhook aqui
