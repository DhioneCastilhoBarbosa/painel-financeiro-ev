# FinanceDash — Nginx Produção
# Substitua SEU_DOMINIO pelo domínio real (ex: app.financedash.com.br)
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - "$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 150M;

    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript image/svg+xml;

    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    upstream web_frontend {
        server web:3000;
        keepalive 16;
    }

    # ── HTTP → HTTPS + desafio ACME (renovação Let's Encrypt) ─────────────────
    server {
        listen 80;
        server_name SEU_DOMINIO;

        # Webroot para renovação automática do certificado
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redireciona tudo mais para HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ──────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name SEU_DOMINIO;

        # Certificados Let's Encrypt (gerados pelo script setup.sh)
        ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/SEU_DOMINIO/chain.pem;

        # Configuração SSL Mozilla Intermediate
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # Headers de segurança
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "SAMEORIGIN"                                   always;
        add_header X-Content-Type-Options     "nosniff"                                      always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
        add_header X-XSS-Protection           "1; mode=block"                                always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"     always;

        client_max_body_size 150M;

        # Health check para AWS ALB / monitoramento externo
        location = /health {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # FastAPI — /api/*
        location /api/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_buffering    off;
        }

        # Next.js — todo o resto
        location / {
            proxy_pass         http://web_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_buffering    off;
        }
    }
}
