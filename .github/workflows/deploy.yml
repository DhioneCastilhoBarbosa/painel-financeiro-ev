name: Deploy to AWS ECS

# Dispara somente em push para main (após merge de PR)
on:
  push:
    branches: [main]
  workflow_dispatch:     # Permite disparar manualmente pelo GitHub UI

concurrency:
  group: deploy-production
  cancel-in-progress: false   # Nunca cancela deploys em andamento

# ─────────────────────────────────────────────────────────────────────────────
# CONFIGURAÇÃO NECESSÁRIA (definir como secrets no repositório GitHub):
#
# Secrets obrigatórios:
#   AWS_ACCESS_KEY_ID       — IAM user com permissão em ECR + ECS
#   AWS_SECRET_ACCESS_KEY   — chave do IAM user acima
#   AWS_REGION              — ex: us-east-1
#   ECR_REGISTRY            — ex: 123456789.dkr.ecr.us-east-1.amazonaws.com
#   ECS_CLUSTER             — nome do cluster ECS
#   ECS_SERVICE_API         — nome do service ECS da API
#   ECS_SERVICE_WORKER      — nome do service ECS do worker Celery
#   ECS_SERVICE_BEAT        — nome do service ECS do Celery beat
#   ECS_SERVICE_WEB         — nome do service ECS do Next.js
#   ECS_TASK_DEF_API        — nome da task definition da API
#   ECS_TASK_DEF_WEB        — nome da task definition do frontend
#
# Variáveis (não secrets):
#   ECR_REPO_API            — ex: financedash-api
#   ECR_REPO_WEB            — ex: financedash-web
# ─────────────────────────────────────────────────────────────────────────────

env:
  AWS_REGION:    ${{ secrets.AWS_REGION }}
  ECR_REGISTRY:  ${{ secrets.ECR_REGISTRY }}

jobs:

  # ── Reutiliza o CI para garantir que só código testado vai para produção ───
  ci:
    uses: ./.github/workflows/ci.yml

  # ── Build e push das imagens Docker para o ECR ────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      api_image: ${{ steps.build-api.outputs.image }}
      web_image: ${{ steps.build-web.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        id: build-api
        uses: docker/build-push-action@v6
        with:
          context:    ./apps/api
          push:       true
          tags:       ${{ env.ECR_REGISTRY }}/${{ vars.ECR_REPO_API }}:${{ github.sha }},${{ env.ECR_REGISTRY }}/${{ vars.ECR_REPO_API }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
      - run: echo "image=${{ env.ECR_REGISTRY }}/${{ vars.ECR_REPO_API }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
        id: set-api-image

      - name: Build & push Web image
        id: build-web
        uses: docker/build-push-action@v6
        with:
          context:    ./apps/web
          push:       true
          tags:       ${{ env.ECR_REGISTRY }}/${{ vars.ECR_REPO_WEB }}:${{ github.sha }},${{ env.ECR_REGISTRY }}/${{ vars.ECR_REPO_WEB }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Migração do banco de dados ─────────────────────────────────────────────
  # Roda ANTES do deploy para garantir schema atualizado
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # Roda `alembic upgrade head` como uma ECS run-task única (não serviço)
      # TODO: ajustar --overrides com a command correta e subnets/security groups
      - name: Run alembic upgrade head via ECS run-task
        run: |
          aws ecs run-task \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --task-definition ${{ secrets.ECS_TASK_DEF_API }} \
            --launch-type FARGATE \
            --overrides '{"containerOverrides":[{"name":"api","command":["alembic","upgrade","head"]}]}' \
            --wait-for-completion \
            --network-configuration "awsvpcConfiguration={subnets=[TODO_SUBNET_ID],securityGroups=[TODO_SG_ID],assignPublicIp=DISABLED}"

  # ── Deploy dos serviços ECS ────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy API service
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE_API }} \
            --force-new-deployment

      - name: Deploy Worker service
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE_WORKER }} \
            --force-new-deployment

      - name: Deploy Beat service
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE_BEAT }} \
            --force-new-deployment

      - name: Deploy Web service
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE_WEB }} \
            --force-new-deployment

      - name: Wait for API deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE_API }}

      - name: Deployment summary
        run: |
          echo "✅ Deploy concluído com sucesso!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "By: ${{ github.actor }}"
