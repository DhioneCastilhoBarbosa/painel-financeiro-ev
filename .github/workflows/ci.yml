name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Backend: lint + type check ─────────────────────────────────────────────
  backend-lint:
    name: Backend lint & type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app/ --output-format=github

      - name: Ruff format check
        run: ruff format app/ --check

  # ── Backend: testes ────────────────────────────────────────────────────────
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER:     financedash
          POSTGRES_PASSWORD: financedash_test
          POSTGRES_DB:       financedash_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U financedash"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://financedash:financedash_test@localhost:5432/financedash_test
      DATABASE_URL:      postgresql+asyncpg://financedash:financedash_test@localhost:5432/financedash_test
      REDIS_URL:         redis://localhost:6379/0
      SECRET_KEY:        ci-test-secret-key-not-used-in-production-32ch
      ENVIRONMENT:       test
      DEBUG:             "false"
      ALLOWED_ORIGINS:   http://localhost:3000
      APP_URL:           http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: apps/api/coverage.xml
          fail_ci_if_error: false

  # ── Frontend: type check + lint ────────────────────────────────────────────
  frontend-check:
    name: Frontend type check & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint -- --max-warnings=0
        continue-on-error: true   # Remover quando lint estiver limpo

  # ── Docker build (valida que as imagens constroem sem erro) ────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-check]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (without push)
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: false
          tags: financedash-api:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build Web image (without push)
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: false
          tags: financedash-web:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
