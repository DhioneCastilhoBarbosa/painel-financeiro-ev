name: Auto-merge

# Habilita auto-merge em todo PR aberto para main.
# O GitHub fará o merge automaticamente assim que todos os checks do CI passarem.

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Enable auto-merge
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --auto \
            --squash \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
